<!DOCTYPE html>
<html>

<head>

  <base href="$FLUTTER_BASE_HREF">

  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
  <meta http-equiv="Pragma" content="no-cache" />
  <meta http-equiv="Expires" content="0" />
  <meta name="description" content="This is a web portal for managing white label applications.">

  <!-- iOS meta tags & icons -->
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="Admin">
  <link rel="apple-touch-icon" href="icons/Icon-192.png">

  <!-- Favicon -->
  <link rel="icon" type="image/png" href="favicon.png" />
  <title>Alpha Admin</title>
  <link rel="manifest" href="manifest.json">
</head>

<body>
  <!-- flutter_bootstrap.js?v=__BUILD_VERSION__ forces a fresh download on every
       Amplify deploy so users never run stale JavaScript. The BUILD_VERSION
       placeholder is replaced by sed in amplify.yml at build time. -->
  <script src="flutter_bootstrap.js?v=__BUILD_VERSION__" async></script>
</body>

</html>
